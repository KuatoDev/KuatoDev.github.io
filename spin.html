<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Spin Lembur - Random spin wheel untuk nentuin siapa yang lembur.">
  <meta name="theme-color" content="#0a1628">
  <link rel="manifest" href="manifest.json">
  <title>Spin Lembur | Vern Kuato</title>
  <link rel="icon" href="assets/logo.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="spin-body">

  <div class="background-wrapper" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="toolbar-area">
    <a href="index.html" class="back-btn">
      <span class="material-icons" aria-hidden="true">arrow_back</span> Home
    </a>
  </div>

  <h1 class="spin-title">Spin Lembur 🎯</h1>

  <div class="spin-container">
    <div class="wheel-container">
      <div class="wheel-pointer" aria-hidden="true"></div>
      <canvas id="wheelCanvas" class="wheel-canvas" width="500" height="500" aria-label="Spin wheel"></canvas>
    </div>
    <div class="spin-input-area">
      <label for="namesInput">Daftar Peserta (Max 9):</label>
      <textarea id="namesInput" placeholder="Ketik nama...">LUKMAN
KUATO
DWI NUR
ARY
ZULFIKAR
SHOHIFDA
SURYAMIN
ARIS
AFJAN</textarea>
      <button id="spinBtn">PUTAR GES! 🎲</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
